openapi: 3.0.0
info:
  title: 'AdamRMS API'
  description: 'AdamRMS is a free, open source advanced Rental Management System for Theatre, AV & Broadcast. This is the API listing for the v1 API, which is currently in Production and active development. You can find out more about AdamRMS at [https://adam-rms.com](https://adam-rms.com).'
  termsOfService: 'https://adam-rms.com/legal'
  contact:
    name: 'AdamRMS Support'
    url: 'https://github.com/adam-rms'
    email: support@adam-rms.com
  license:
    name: 'GNU Affero General Public License v3.0'
    url: 'https://github.com/adam-rms/adam-rms/blob/main/LICENSE'
  version: v1
servers:
  -
    url: 'https://dash.adam-rms.com/api/'
    description: Production
paths:
  /projects/changedeliveryNotes.php:
    post:
      tags:
        - projects
      summary: 'Change delivery Notes'
      description: "Change the delivery Notes of a project  \nRequires Instance Permission PROJECTS:EDIT:DELIVERY_NOTES\n"
      operationId: changedeliveryNotes
      parameters:
        -
          name: projects_id
          in: query
          description: 'Project ID'
          required: 'true'
          schema:
            type: number
        -
          name: projects_deliveryNotes
          in: query
          description: 'delivery Notes'
          required: 'true'
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                properties:
                  result: { description: 'Whether the request was successful', type: boolean }
                type: object
        '404':
          description: 'Permission Error'
