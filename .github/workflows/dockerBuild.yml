name: Docker Build & Push
on:
  release:
    types: [published]

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Create Version Folder if not exists
        run: |
          test -d src/version || mkdir src/version
        shell: bash
      - name: Write Version Number
        run: |
          echo $TAG > src/version/TAG.txt
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
      - name: Docker github meta
        id: docker_github_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          context: git
          labels: |
            maintainer=adam-rms
            org.opencontainers.image.source=https://github.com/adam-rms/adam-rms
            org.opencontainers.image.documentation=https://adam-rms.com/self-hosting
            org.opencontainers.image.url=https://adam-rms.com
            org.opencontainers.image.vendor="Bithell Studios Ltd."
            org.opencontainers.image.description="AdamRMS is a free, open source advanced Rental Management System for Theatre, AV & Broadcast. This image is a PHP Apache2 docker container, which exposes AdamRMS on port 80."
            org.opencontainers.image.licenses=AGPL-3.0
          tags: |
            type=semver,pattern=${{ github.event.release.tag_name }}
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.docker_github_meta.outputs.labels }}
          annotations: ${{ steps.docker_github_meta.outputs.annotations }}
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Docker github meta
        id: docker_github_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          context: git
          labels: |
            maintainer=adam-rms
            org.opencontainers.image.source=https://github.com/adam-rms/adam-rms
            org.opencontainers.image.documentation=https://adam-rms.com/self-hosting
            org.opencontainers.image.url=https://adam-rms.com
            org.opencontainers.image.vendor="Bithell Studios Ltd."
            org.opencontainers.image.description="AdamRMS is a free, open source advanced Rental Management System for Theatre, AV & Broadcast. This image is a PHP Apache2 docker container, which exposes AdamRMS on port 80."
            org.opencontainers.image.licenses=AGPL-3.0
          tags: |
            type=semver,pattern=${{ github.event.release.tag_name }}
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAG_ARGS=()
          while IFS= read -r tag; do
            TAG_ARGS+=( -t "$tag" )
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create "${TAG_ARGS[@]}" \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.docker_github_meta.outputs.version }}
      - name: Attest Docker image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.docker_github_meta.outputs.digest }}
          push-to-registry: true
